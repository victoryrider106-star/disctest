<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile System Response Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        h1 { text-align: center; }
        .card { border: 1px solid #ccc; border-radius: 5px; margin: 10px; padding: 15px; }
        table { width: 100%; margin-bottom: 20px; }
        th, td { padding: 10px; text-align: center; }
        .button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background-color: #45a049; }
    </style>
</head>
<body>
<div class="container">
    <h1>Personal Profile System Response Page</h1>
    <form id="response-form">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div>
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div>
            <label for="focus">Focus:</label>
            <input type="text" id="focus" name="focus" required>
        </div>
        <div id="word-groups"></div>
        <button type="button" class="button" onclick="downloadJSON()">Download Responses</button>
        <button type="button" class="button" onclick="clearForm()">Clear Form</button>
    </form>
</div>
<script>
    const wordGroups = [
        { title: 'Group 1', words: ['Word A1', 'Word A2', 'Word A3'] },
        { title: 'Group 2', words: ['Word B1', 'Word B2', 'Word B3'] },
        // Add remaining groups here up to 28
    ];

    const wordGroupContainer = document.getElementById('word-groups');

    wordGroups.forEach((group, index) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `<h2>${group.title}</h2><table><tr>${group.words.map(word => `<td>${word}<br><input type='radio' name='group${index}_most' value='${word}'> Most<br><input type='radio' name='group${index}_least' value='${word}'> Least</td>`).join('')}</tr></table>`;
        wordGroupContainer.appendChild(card);
    });

    function clearForm() {
        document.getElementById('response-form').reset();
    }

    function downloadJSON() {
        const data = { name: document.getElementById('name').value, date: document.getElementById('date').value, focus: document.getElementById('focus').value };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'responses.json';
        a.click();
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
