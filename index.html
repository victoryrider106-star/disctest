<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISC Assessment Form</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 4px; }
        h1 { text-align: center; }
        label { display: block; margin: 10px 0 5px; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { background-color: #007BFF; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DISC Assessment Form</h1>
        <form action="#" method="POST">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="d">Which DISC profile do you identify with the most?</label>
            <select id="d" name="disc_profile">
                <option value="d">D - Dominance</option>
                <option value="i">I - Influence</option>
                <option value="s">S - Steadiness</option>
                <option value="c">C - Conscientiousness</option>
            </select>

            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
